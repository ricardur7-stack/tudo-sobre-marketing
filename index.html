<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VETRIX PANEL</title>

<!-- ÍCONE / PWA -->
<link rel="apple-touch-icon" href="icon.PNG">
<link rel="icon" type="image/png" href="icon.PNG">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VETRIX">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a0000, #000);
  color: white;
}

/* LOGIN */
#loginBox {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-container {
  width: 90%;
  max-width: 320px;
  background: rgba(0, 0, 0, 0.85);
  border: 2px solid red;
  border-radius: 16px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 0 25px red, inset 0 0 15px rgba(255,0,0,0.2);
  backdrop-filter: blur(10px);
  animation: fadeIn 0.6s ease;
}

.login-container h2 {
  color: red;
  font-size: 26px;
  letter-spacing: 2px;
  text-shadow: 0 0 12px red;
}

.subtitle {
  font-size: 13px;
  color: #ccc;
  margin-bottom: 20px;
}

.login-container input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  margin-bottom: 15px;
}

.login-container button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, red, #700000);
  color: white;
  font-weight: bold;
  box-shadow: 0 0 15px red;
  cursor: pointer;
}

/* PAINEL */
#painel {
  display: none;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 380px;
  margin: auto;
  background: rgba(0,0,0,0.85);
  padding: 18px;
  border-radius: 14px;
  border: 2px solid red;
  box-shadow: 0 0 20px red;
}

h3 {
  color: red;
  text-shadow: 0 0 10px red;
}

.button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: linear-gradient(red, #700000);
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.sliderBox {
  margin-top: 15px;
  text-align: left;
}

.slider {
  width: 100%;
  accent-color: red;
}

.label {
  color: red;
  font-weight: bold;
}

#fpsValue, #lagValue {
  font-size: 12px;
  color: #ccc;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(15px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login-container">
    <h2>VETRIX</h2>
    <p class="subtitle">Acesso ao painel</p>

    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="login()">ENTRAR</button>
  </div>
</div>

<!-- PAINEL -->
<div id="painel">
  <div class="container">
    
    <h3>VETRIX SENSI PANEL</h3>

    <p id="device"></p>

    <button class="button" onclick="otimizarBasico()">Otimização Básica</button>
    <button class="button" onclick="otimizarAvancado()">Otimização Avançada</button>

    <div class="sliderBox">
      <p class="label">FPS do Free Fire</p>
      <input type="range" min="1" max="240" value="60" class="slider" id="fpsRange" oninput="updateFPS()">
      <p id="fpsValue">FPS: 60</p>
    </div>

    <div class="sliderBox">
      <p class="label">Input Lag</p>
      <input type="range" min="0" max="100" value="0" class="slider" id="lagRange" oninput="updateLag()">
      <p id="lagValue">Delay: 0%</p>
    </div>

    <button class="button" onclick="aplicarConfigs()">Aplicar configurações</button>

    <button class="button" onclick="abrirFreeFire()">ABRIR FREE FIRE</button>

  </div>
</div>

<script>
function login() {
  let senha = document.getElementById("senha").value;

  if (senha === "VETRIX00") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";

    document.getElementById("device").innerText = "Dispositivo: " + getDeviceInfo();
  } else {
    alert("Senha incorreta!");
  }
}

function getDeviceInfo() {
  let ua = navigator.userAgent;

  let iosVersion = "Desconhecido";
  let match = ua.match(/OS (\\d+_\\d+)/);

  if (match) {
    iosVersion = match[1].replace("_", ".");
  }

  if (/iPhone/.test(ua)) return "iPhone | iOS " + iosVersion;
  if (/iPad/.test(ua)) return "iPad | iOS " + iosVersion;

  return "Dispositivo não identificado";
}

function updateFPS() {
  let fps = document.getElementById("fpsRange").value;
  document.getElementById("fpsValue").innerText = "FPS: " + fps;
}

function updateLag() {
  let lag = document.getElementById("lagRange").value;
  document.getElementById("lagValue").innerText = "Delay: " + lag + "%";
}

function otimizarBasico() {
  let btn = event.target;
  btn.innerText = "Executando...";
  btn.disabled = true;

  setTimeout(() => {
    btn.innerText = "Básica Feita ✓";
    btn.disabled = false;
  }, 2000);
}

function otimizarAvancado() {
  let btn = event.target;
  btn.innerText = "Otimizando...";
  btn.disabled = true;

  setTimeout(() => {
    btn.innerText = "Avançada Aplicada ✓";
    btn.disabled = false;
  }, 2500);
}

function aplicarConfigs() {
  let btn = event.target;
  btn.innerText = "Aplicando...";
  btn.disabled = true;

  setTimeout(() => {
    btn.innerText = "Configurações Aplicadas ✓";
    btn.disabled = false;
  }, 2000);
}

function abrirFreeFire() {
  let btn = event.target;
  btn.innerText = "Abrindo...";
  btn.disabled = true;

  let abriu = false;

  // Se sair da página, significa que abriu o app
  window.addEventListener("blur", () => {
    abriu = true;
  });

  // tenta abrir Free Fire normal
  window.location.href = "freefire://";

  // fallback para MAX
  setTimeout(() => {
    if (!abriu) {
      window.location.href = "freefiremax://";
    }
  }, 1500);

  // fallback final App Store
  setTimeout(() => {
    if (!abriu) {
      window.location.href = "https://apps.apple.com/br/app/free-fire/id1300146617";
    }
  }, 3000);

  setTimeout(() => {
    btn.innerText = "Injetar No Jogo";
    btn.disabled = false;
  }, 4000);
}
</script>

</body>
</html>
